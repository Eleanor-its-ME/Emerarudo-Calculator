<!DOCTYPE html>
<html>
<head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">
	
	<meta charset="UTF-8">
	<title>Emerarudoの計算ツール</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<img src="クローバー_上.PNG" alt="*********************************" class="top-design">
	
	<h1>Emerarudoの計算ツール</h1>
	<input type="text" id="usernameInput" placeholder=" ニックネームを入力">
	<button onclick="greetUser()">決定する！</button>
	<h2 id="displayMessage"></h2>
	
	<input type="number" id="num1" placeholder=" 1つめの数字">

	<select id="symbol">
		<option value="+">+</option>
		<option value="-">-</option>
		<option value="*">×</option>
		<option value="/">÷</option>
	</select>
	
	<input type="number" id="num2" placeholder=" 2つめの数字">
	<button onclick="Calculator()">計算する！</button>
	
	<p id="result"></p>

	<h3>計算履歴</h3>
	<ul id="history"></ul>
	
	<script src="script.js"></script>
</body>
</html>
